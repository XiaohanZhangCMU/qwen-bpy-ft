### Model
### https://huggingface.co/Qwen/Qwen3-4B
model_name_or_path: Qwen/Qwen3-4B
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: moonlake_sft
dataset_dir: data/processed
template: qwen3              # Qwen3 chat template (different from qwen/qwen2)
cutoff_len: 4096
max_samples: ~
overwrite_cache: false
preprocessing_num_workers: 4

### Output
output_dir: outputs/qwen3_4b_lora
logging_dir: outputs/qwen3_4b_lora/logs
save_strategy: steps
save_steps: 100
logging_steps: 10
overwrite_output_dir: false

### Training
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 16  # effective batch = 1 * 16 * 4 GPUs = 64
learning_rate: 5.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true

### Validation
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100

### Optional: report to W&B
# report_to: wandb
# run_name: moonlake-qwen3-4b-lora
