### Fallback config: Qwen2.5-Coder-3B-Instruct for fast iteration
### Swap model_name_or_path and reduce batch accordingly

model_name_or_path: Qwen/Qwen2.5-Coder-3B-Instruct
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
lora_target: all

dataset: moonlake_sft
dataset_dir: data/processed
template: qwen
cutoff_len: 4096            # halved — logits tensor shrinks 4x
max_samples: ~
overwrite_cache: false
preprocessing_num_workers: 4

output_dir: outputs/qwen2_5_coder_3b_lora
logging_dir: outputs/qwen2_5_coder_3b_lora/logs
save_strategy: steps
save_steps: 100
logging_steps: 10
overwrite_output_dir: false

num_train_epochs: 3
per_device_train_batch_size: 1   # was 4 — main OOM fix
gradient_accumulation_steps: 8   # keeps effective batch = 1*8*8GPUs = 64
learning_rate: 5.0e-5
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true     # trades compute for memory on activations

val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
