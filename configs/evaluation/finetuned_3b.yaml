# Fine-tuned Qwen-3B — served via vLLM on port 8000 as LoRA adapter "ft_qwen3b"
# Start server first: bash scripts/serve_3b.sh
model:
  checkpoint_dir: "outputs/qwen2_5_coder_3b_lora"
  model_name_or_path: "ft_qwen3b"   # the --lora-modules name registered in serve_3b.sh
  inference_backend: "vllm"
  api_base: "http://localhost:8000/v1"
  temperature: 0.0
  max_new_tokens: 2048

evaluation:
  prompts_file: "data/eval/prompts.jsonl"
  output_dir: "data/eval"
  pass_at_k: [1, 3, 5]
  num_samples_per_prompt: 5
  max_repair_turns: 0

blender:
  binary: null
  timeout_sec: 60
  headless: true
