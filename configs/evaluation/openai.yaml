# Oracle baseline: GPT-4o — establishes the ceiling
model:
  checkpoint_dir: ""
  model_name_or_path: "gpt-4o"
  inference_backend: "openai"
  temperature: 0.0
  max_new_tokens: 2048

evaluation:
  prompts_file: "data/eval/prompts.jsonl"
  output_dir: "data/eval"
  pass_at_k: [1, 3, 5]
  num_samples_per_prompt: 5
  max_repair_turns: 0

blender:
  binary: null
  timeout_sec: 60
  headless: true
